<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unibet Sports — Odds History Chart</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:   #060a0f; --bg2: #0c1420; --bg3: #111d2e;
  --border: #1a2e45; --accent: #58a6ff;
  --text: #8ab4d4; --text-hi: #cde4f7;
  --green: #00e676; --red: #ff4f4f; --orange: #f0a040;
}
body {
  background:var(--bg); color:var(--text);
  font-family:'Fira Mono','Cascadia Code','Consolas',monospace;
  font-size:12px; height:100vh; display:flex; flex-direction:column;
}
#topbar {
  display:flex; align-items:center; gap:12px; padding:8px 16px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.logo { color:var(--accent); font-weight:700; font-size:14px; }
.logo span { color:var(--text); font-weight:400; font-size:11px; }
.ctrl {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  font-family:inherit; font-size:11px; padding:4px 8px; outline:none; cursor:pointer;
}
button.ctrl:hover { color:var(--text-hi); border-color:var(--accent); }
select.ctrl { cursor:pointer; }
#layout { display:flex; flex:1; overflow:hidden; }
#sidebar {
  width:300px; background:var(--bg2); border-right:1px solid var(--border);
  overflow-y:auto; flex-shrink:0;
}
#sidebar h3 {
  color:var(--accent); font-size:11px; padding:10px 12px 6px;
  border-bottom:1px solid var(--border);
}
.match-item {
  padding:8px 12px; cursor:pointer; border-bottom:1px solid rgba(26,46,69,.4);
  transition:background .12s;
}
.match-item:hover { background:var(--bg3); }
.match-item.active { background:rgba(88,166,255,.08); border-left:2px solid var(--accent); }
.match-item .name { color:var(--text-hi); font-size:11px; margin-bottom:3px; }
.match-item .info { color:#3a6080; font-size:9px; display:flex; gap:6px; align-items:center; }
.sport-tag {
  font-size:8px; font-weight:700; padding:0 3px;
}
.sport-tag.tennis { background:#1a3a5c; color:var(--accent); }
.sport-tag.soccer { background:#3a2a0c; color:var(--orange); }
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#chart-area { flex:1; position:relative; padding:10px; }
#controls {
  display:flex; gap:8px; align-items:center; padding:8px 16px;
  background:var(--bg2); border-top:1px solid var(--border); flex-wrap:wrap;
}
.sel-pill {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  font-family:inherit; font-size:10px; padding:3px 9px; cursor:pointer;
}
.sel-pill:hover { border-color:var(--accent); }
.sel-pill.active { border-color:var(--accent); color:var(--accent); }
.time-pill {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  font-family:inherit; font-size:10px; padding:3px 9px; cursor:pointer;
}
.time-pill:hover { border-color:var(--accent); }
.time-pill.active { border-color:var(--accent); color:var(--accent); }
#info-bar {
  display:flex; gap:16px; padding:6px 16px; font-size:10px;
  background:var(--bg2); border-top:1px solid var(--border);
}
#info-bar span { color:#3a6080; }
#info-bar b { color:var(--accent); }
#loading { color:#2a4060; text-align:center; padding:60px 0; font-size:12px; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#2a4060; border-radius:3px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">UNIBET <span>/ Odds Chart</span></div>
  <input id="api-url" class="ctrl" style="width:190px" value="http://localhost:5333">
  <button class="ctrl" onclick="loadMatches()">Reload</button>
  <a href="dashboard.html" style="color:var(--accent);font-size:11px;text-decoration:none;margin-left:auto">Dashboard</a>
</div>

<div id="layout">
  <div id="sidebar">
    <h3>Matches</h3>
    <div id="match-list"><div id="loading">Loading matches...</div></div>
  </div>
  <div id="main">
    <div id="chart-area"><canvas id="chart"></canvas></div>
    <div id="controls">
      <span style="color:#3a6080;font-size:10px">Selection:</span>
      <span id="sel-pills"></span>
      <span style="margin-left:12px;color:#3a6080;font-size:10px">Window:</span>
      <button class="time-pill active" data-min="5" onclick="setWindow(this)">5m</button>
      <button class="time-pill" data-min="15" onclick="setWindow(this)">15m</button>
      <button class="time-pill" data-min="60" onclick="setWindow(this)">1h</button>
      <button class="time-pill" data-min="360" onclick="setWindow(this)">6h</button>
      <button class="time-pill" data-min="0" onclick="setWindow(this)">All</button>
    </div>
    <div id="info-bar">
      <span>Current: <b id="info-cur">—</b></span>
      <span>Min: <b id="info-min">—</b></span>
      <span>Max: <b id="info-max">—</b></span>
      <span>Delta: <b id="info-delta">—</b></span>
    </div>
  </div>
</div>

<script>
function getBase() { return document.getElementById('api-url').value.replace(/\/$/,'') || 'http://localhost:5333'; }

let chart = null;
let activeMatch = null;
let activeSelection = null;
let activeMarket = '1X2';
let timeWindow = 5;
let livePoints = [];
let _es = null;

async function loadMatches() {
  const listEl = document.getElementById('match-list');
  listEl.innerHTML = '<div id="loading">Loading matches...</div>';

  try {
    const [marketsRes, pricesRes] = await Promise.all([
      fetch(getBase() + '/markets'),
      fetch(getBase() + '/prices'),
    ]);
    const markets = await marketsRes.json();
    const prices  = await pricesRes.json();

    const matchIds = new Set([
      ...Object.keys(markets),
      ...Object.keys(prices),
    ]);

    if (matchIds.size === 0) {
      listEl.innerHTML = '<div id="loading">No matches yet. Start the server.</div>';
      return;
    }

    listEl.innerHTML = '';
    const entries = [];
    for (const mid of matchIds) {
      const meta = markets[mid] || {};
      const odds = prices[mid] || {};
      const mktKey = Object.keys(odds)[0] || '1X2';
      const mktOdds = odds[mktKey] || {};
      const players = Object.keys(mktOdds).length >= 2
        ? Object.keys(mktOdds)
        : [meta.player_a, meta.player_b].filter(Boolean);
      const matchName = meta.match || players.join(' vs ') || mid;
      const sport = meta.sport || 'tennis';

      entries.push({ mid, meta, players, mktKey, matchName, sport });
    }

    // Sort: live first, then alphabetical
    entries.sort((a, b) => {
      if (a.meta.live !== b.meta.live) return a.meta.live ? -1 : 1;
      return a.matchName.localeCompare(b.matchName);
    });

    for (const e of entries) {
      const div = document.createElement('div');
      div.className = 'match-item';
      div.dataset.mid = e.mid;
      const sportTag = e.sport === 'soccer'
        ? '<span class="sport-tag soccer">FOOT</span>'
        : '<span class="sport-tag tennis">TENN</span>';
      div.innerHTML = `
        <div class="name">${e.matchName}</div>
        <div class="info">${sportTag} ${e.meta.competition || ''} ${e.meta.live ? '· LIVE' : ''}</div>`;
      div.onclick = () => selectMatch(e.mid, e.players, e.mktKey);
      listEl.appendChild(div);
    }

    const first = listEl.querySelector('.match-item');
    if (first) first.click();

  } catch (err) {
    listEl.innerHTML = '<div id="loading">Error: ' + err.message + '</div>';
  }
}

function selectMatch(mid, players, market) {
  activeMatch = mid;
  activeSelection = players[0] || null;
  activeMarket = market || '1X2';
  livePoints = [];

  document.querySelectorAll('.match-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector('.match-item[data-mid="' + CSS.escape(mid) + '"]');
  if (item) item.classList.add('active');

  const pillsEl = document.getElementById('sel-pills');
  pillsEl.innerHTML = '';
  for (const p of players) {
    const btn = document.createElement('button');
    btn.className = 'sel-pill' + (p === activeSelection ? ' active' : '');
    btn.textContent = p;
    btn.onclick = () => { activeSelection = p; fetchHistory(); };
    pillsEl.appendChild(btn);
  }

  fetchHistory();
  startSSE();
}

async function fetchHistory() {
  if (!activeMatch || !activeSelection) return;

  try {
    const params = new URLSearchParams({
      match_id: activeMatch,
      selection: activeSelection,
      market: activeMarket,
      limit: 5000,
    });
    const res = await fetch(getBase() + '/history?' + params);
    const rows = await res.json();

    livePoints = rows.map(r => ({ x: r.ts * 1000, y: r.odd }));

    try {
      const pricesRes = await fetch(getBase() + '/prices');
      const prices = await pricesRes.json();
      const mktOdds = (prices[activeMatch] || {})[activeMarket] || {};
      const cur = mktOdds[activeSelection];
      if (cur !== undefined) {
        const lastTs = livePoints.length ? livePoints[livePoints.length - 1].x : Date.now();
        if (Date.now() - lastTs > 2000) {
          livePoints.push({ x: Date.now(), y: cur });
        }
      }
    } catch {}

    drawChart();
  } catch (err) {
    console.warn('history fetch failed:', err);
  }
}

function drawChart() {
  const ctx = document.getElementById('chart').getContext('2d');
  const now = Date.now();
  let filtered = livePoints;
  if (timeWindow > 0) {
    const cutoff = now - timeWindow * 60 * 1000;
    filtered = livePoints.filter(p => p.x >= cutoff);
  }

  if (chart) chart.destroy();

  const values = filtered.map(p => p.y);
  const cur = values.length ? values[values.length - 1] : null;
  const mn  = values.length ? Math.min(...values) : null;
  const mx  = values.length ? Math.max(...values) : null;
  const first = values.length ? values[0] : null;
  const delta = cur !== null && first !== null ? (cur - first) : null;

  document.getElementById('info-cur').textContent = cur !== null ? cur.toFixed(2) : '—';
  document.getElementById('info-min').textContent = mn !== null ? mn.toFixed(2) : '—';
  document.getElementById('info-max').textContent = mx !== null ? mx.toFixed(2) : '—';
  document.getElementById('info-delta').textContent = delta !== null
    ? (delta >= 0 ? '+' : '') + delta.toFixed(2)
    : '—';

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: activeSelection || 'odds',
        data: filtered,
        borderColor: '#58a6ff',
        backgroundColor: 'rgba(88,166,255,0.08)',
        borderWidth: 1.5,
        pointRadius: 0,
        fill: true,
        tension: 0.1,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      scales: {
        x: {
          type: 'time',
          time: {
            unit: timeWindow <= 15 ? 'minute' : timeWindow <= 60 ? 'minute' : 'hour',
            displayFormats: { minute: 'HH:mm', hour: 'HH:mm' },
          },
          grid: { color: '#1a2e45' },
          ticks: { color: '#3a6080', font: { size: 10 } },
        },
        y: {
          grid: { color: '#1a2e45' },
          ticks: {
            color: '#3a6080',
            font: { size: 10 },
          },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.parsed.y.toFixed(2),
          },
        },
      },
    },
  });
}

function setWindow(el) {
  document.querySelectorAll('.time-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  timeWindow = parseInt(el.dataset.min);
  drawChart();
}

function startSSE() {
  if (_es) _es.close();
  _es = new EventSource(getBase() + '/stream');

  _es.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type !== 'price') return;
    if (String(msg.match_id) !== activeMatch) return;

    const odd = (msg.odds || {})[activeSelection];
    if (odd === undefined) return;

    livePoints.push({ x: msg.ts * 1000, y: odd });
    const cutoff = Date.now() - 24 * 3600 * 1000;
    while (livePoints.length > 1 && livePoints[0].x < cutoff) livePoints.shift();

    drawChart();
  };

  _es.onerror = () => {
    _es.close();
    setTimeout(startSSE, 5000);
  };
}

loadMatches();
</script>
</body>
</html>
