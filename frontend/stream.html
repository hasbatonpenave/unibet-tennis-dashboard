<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unibet Tennis — SSE Event Log</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --up: #3fb950;
    --down: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 16px; }
  header a { color: var(--accent); text-decoration: none; font-size: 12px; margin-left: 12px; }
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 11px;
  }
  .toolbar button {
    background: var(--border);
    color: var(--text);
    border: none;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
  }
  .toolbar button:hover { background: #484f58; }
  .toolbar button.active { background: var(--accent); color: #000; }
  .toolbar label { color: var(--muted); }
  #event-log {
    height: calc(100vh - 90px);
    overflow-y: auto;
    padding: 8px 0;
  }
  .event-row {
    padding: 3px 16px;
    border-bottom: 1px solid rgba(48, 54, 61, 0.5);
    display: flex;
    gap: 10px;
    align-items: baseline;
    font-size: 11px;
  }
  .event-row:hover { background: rgba(88, 166, 255, 0.05); }
  .event-row.snapshot { background: rgba(88, 166, 255, 0.08); }
  .event-ts { color: var(--muted); white-space: nowrap; min-width: 85px; font-size: 10px; }
  .event-type {
    font-weight: 600;
    white-space: nowrap;
    min-width: 55px;
  }
  .event-type.snapshot { color: var(--accent); }
  .event-type.price { color: var(--up); }
  .event-type.error { color: var(--down); }
  .event-match { color: var(--text); min-width: 200px; }
  .event-odds {
    color: var(--accent);
    white-space: nowrap;
  }
  .event-odds .up { color: var(--up); }
  .event-odds .down { color: var(--down); }
  .event-detail { color: var(--muted); font-size: 10px; }
  .count {
    background: var(--border);
    color: var(--text);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    margin-left: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>SSE Event Log</h1>
  <div>
    <a href="dashboard.html">Dashboard</a>
    <a href="chart.html">Chart</a>
  </div>
</header>

<div class="toolbar">
  <label>Filters:</label>
  <button id="btn-all" class="active" onclick="setFilter('all')">All<span id="cnt-all" class="count">0</span></button>
  <button id="btn-price" onclick="setFilter('price')">Price<span id="cnt-price" class="count">0</span></button>
  <button id="btn-snapshot" onclick="setFilter('snapshot')">Snapshot<span id="cnt-snapshot" class="count">0</span></button>
  <button id="btn-clear" onclick="clearLog()">Clear</button>
  <button id="btn-pause" onclick="togglePause()">Pause</button>
  <span style="margin-left:auto;color:var(--muted)">
    Events: <strong id="total-events">0</strong>
  </span>
  <span style="color:var(--muted)">
    Status: <strong id="conn-status" style="color:var(--up)">Connected</strong>
  </span>
</div>

<div id="event-log"></div>

<script>
const API = 'http://localhost:5003';
let filter = 'all';
let paused = false;
let eventCounts = { all: 0, price: 0, snapshot: 0 };
const MAX_EVENTS = 1000;

const log = document.getElementById('event-log');

function addEvent(type, data) {
  if (paused) return;
  if (filter !== 'all' && filter !== type) {
    eventCounts.all++;
    updateCounts();
    return;
  }

  eventCounts.all++;
  eventCounts[type] = (eventCounts[type] || 0) + 1;
  updateCounts();

  const ts = new Date(data.ts ? data.ts * 1000 : Date.now()).toLocaleTimeString('fr-FR', { hour12: false });
  let match = data.match_id || '';
  let oddsHTML = '';
  let detailHTML = '';

  if (type === 'price') {
    const odds = data.odds || {};
    const mov = data.movements || {};
    oddsHTML = Object.entries(odds).map(([sel, price]) => {
      const dir = mov[sel] || '';
      const cls = dir === 'up' ? 'up' : dir === 'down' ? 'down' : '';
      return `<span class="${cls}">${sel}: ${price.toFixed(2)}</span>`;
    }).join(' ');
    const meta = data.meta || {};
    match = meta.match || match;
    if (data.live) {
      const s = data.score;
      if (s) {
        detailHTML = `live | score=${s.home}-${s.away} | sets=${JSON.stringify(s.sets)}`;
      } else {
        detailHTML = 'live';
      }
    }
  }

  if (type === 'snapshot') {
    const prices = data.prices || {};
    const count = Object.keys(prices).length;
    detailHTML = `${count} matches`;
    match = 'INITIAL SNAPSHOT';
  }

  const row = document.createElement('div');
  row.className = `event-row ${type}`;
  row.innerHTML = `
    <span class="event-ts">${ts}</span>
    <span class="event-type ${type}">${type.toUpperCase()}</span>
    <span class="event-match">${esc(match)}</span>
    <span class="event-odds">${oddsHTML}</span>
    <span class="event-detail">${detailHTML}</span>
  `;
  log.prepend(row);

  // Trim old events
  while (log.children.length > MAX_EVENTS) {
    log.removeChild(log.lastChild);
  }

  document.getElementById('total-events').textContent = eventCounts.all;
}

function updateCounts() {
  document.getElementById('cnt-all').textContent = eventCounts.all;
  document.getElementById('cnt-price').textContent = eventCounts.price || 0;
  document.getElementById('cnt-snapshot').textContent = eventCounts.snapshot || 0;
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${f}`).classList.add('active');
  // Rebuild from stored events? No stored buffer for simplicity — new events follow filter
}

function clearLog() {
  log.innerHTML = '';
  eventCounts = { all: 0, price: 0, snapshot: 0 };
  updateCounts();
}

function togglePause() {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? 'Resume' : 'Pause';
  document.getElementById('btn-pause').classList.toggle('active', paused);
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = String(s || '');
  return div.innerHTML;
}

// ── SSE ─────────────────────────────────────────────────────────────────────
const evtSource = new EventSource(`${API}/stream`);

evtSource.addEventListener('open', () => {
  document.getElementById('conn-status').textContent = 'Connected';
  document.getElementById('conn-status').style.color = '#3fb950';
});

evtSource.onerror = () => {
  document.getElementById('conn-status').textContent = 'Disconnected';
  document.getElementById('conn-status').style.color = '#f85149';
};

evtSource.onmessage = (event) => {
  try {
    const data = JSON.parse(event.data);
    addEvent(data.type || 'unknown', data);
  } catch (e) {
    addEvent('error', { match_id: 'parse-error', message: e.message });
  }
};
</script>
</body>
</html>
